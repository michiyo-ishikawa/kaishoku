<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="会食記録">
<meta name="theme-color" content="#ff7e6b">
<link rel="apple-touch-icon" href="icon-192.png">
<title>🍽 会食記録</title>
<link rel="stylesheet" href="styles.css">
<!-- Excel(SheetJS), PDF(jsPDF), 日本語フォント -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

<header>
  <h1>🍽 会食記録</h1>
  <span class="sync-status" id="syncStatus">起動中…</span>
</header>

<nav>
  <button class="tab-btn active" data-view="records">📅 記録</button>
  <button class="tab-btn" data-view="members">👥 メンバー</button>
</nav>

<div class="view active" id="view-records">
  <div class="filter-bar no-print">
    <input type="text" id="filterRecord" placeholder="🔍 会場・参加者・メモ検索">
    <button class="btn btn-secondary btn-small" id="btnExport">📤 出力</button>
  </div>
  <div id="selectionBar" class="selection-bar" style="display:none">
    <span>✅ <span id="selCount">0</span>件選択中</span>
    <div>
      <button class="sel-btn" id="btnSelectAll">すべて選択</button>
      <button class="sel-btn" id="btnSelectClear">クリア</button>
    </div>
  </div>
  <div id="recordList"></div>
</div>

<div class="view" id="view-members">
  <div class="filter-bar no-print">
    <input type="text" id="filterMember" placeholder="🔍 氏名・企業検索">
    <button class="btn btn-secondary btn-small" id="btnImportMembers">📥 取込</button>
    <button class="btn btn-secondary btn-small" id="btnExport2">📤 出力</button>
    <button class="btn btn-small" id="btnAddMember">+ 追加</button>
  </div>
  <div id="memberList"></div>
</div>

<button class="fab" id="fabAdd" title="新規記録">+</button>

<!-- 記録モーダル -->
<div class="modal-bg" id="modalRecord">
  <div class="modal">
    <h2>🍽 会食記録</h2>
    <input type="hidden" id="recordId">

    <label>📅 日時</label>
    <input type="datetime-local" id="recDate">

    <label>📍 会場 <span class="label-hint" id="venueHint">(自由入力可)</span></label>
    <div class="venue-input-wrap">
      <input type="text" id="recVenue" placeholder="例: 銀座○○ / 店舗名で検索">
      <div class="venue-suggest" id="venueSuggest" style="display:none"></div>
    </div>
    <div class="venue-info" id="venueInfo" style="display:none"></div>

    <label>👥 参加者</label>
    <div class="member-search">
      <input type="text" id="memberSearchInput" placeholder="検索 / 新規入力">
      <button class="btn btn-small btn-secondary" id="btnAddNewInline">＋新規</button>
    </div>
    <div class="member-list-pick" id="memberPickList"></div>
    <div class="selected-members" id="selectedMembers"></div>

    <label>💰 費用明細 (円)</label>
    <div class="cost-grid">
      <div class="cost-item">
        <label>会食代</label>
        <input type="number" id="costMain" class="cost-input" placeholder="0" inputmode="numeric">
      </div>
      <div class="cost-item">
        <label>2次会</label>
        <input type="number" id="costSecond" class="cost-input" placeholder="0" inputmode="numeric">
      </div>
      <div class="cost-item">
        <label>交通費</label>
        <input type="number" id="costTransport" class="cost-input" placeholder="0" inputmode="numeric">
      </div>
      <div class="cost-item">
        <label>その他</label>
        <input type="number" id="costOther" class="cost-input" placeholder="0" inputmode="numeric">
      </div>
    </div>
    <div class="cost-total">
      <span class="label">合計</span>
      <span class="value" id="costTotalDisplay">¥0</span>
    </div>

    <label>💳 支払い方法</label>
    <div class="pay-options" id="payOptions">
      <label class="pay-option"><input type="radio" name="payment" value="現金"><span class="pay-label">💴 現金</span></label>
      <label class="pay-option"><input type="radio" name="payment" value="クレジット"><span class="pay-label">💳 クレジット</span></label>
      <label class="pay-option"><input type="radio" name="payment" value="QR決済"><span class="pay-label">📱 QR決済</span></label>
      <label class="pay-option"><input type="radio" name="payment" value="請求書"><span class="pay-label">📄 請求書</span></label>
      <label class="pay-option"><input type="radio" name="payment" value="その他"><span class="pay-label">✨ その他</span></label>
    </div>

    <label>📝 メモ</label>
    <textarea id="recMemo" placeholder="議題・印象・備考など"></textarea>

    <div class="modal-actions">
      <button class="btn btn-secondary" data-close="modalRecord">キャンセル</button>
      <button class="btn btn-danger" id="btnDeleteRecord" style="display:none">削除</button>
      <button class="btn" id="btnSaveRecord">保存</button>
    </div>
  </div>
</div>

<!-- メンバー編集モーダル -->
<div class="modal-bg" id="modalMember">
  <div class="modal">
    <h2 id="modalMemberTitle">👤 メンバー</h2>
    <input type="hidden" id="memberId">
    <label>氏名 *</label>
    <input type="text" id="memName">
    <label>企業名</label>
    <input type="text" id="memCompany">
    <label>連絡先</label>
    <input type="text" id="memContact" placeholder="メール / 電話 / 部署など">
    <label>メモ</label>
    <textarea id="memMemo"></textarea>
    <div class="modal-actions">
      <button class="btn btn-secondary" data-close="modalMember">キャンセル</button>
      <button class="btn btn-danger" id="btnDeleteMember" style="display:none">削除</button>
      <button class="btn" id="btnSaveMember">保存</button>
    </div>
  </div>
</div>

<!-- メンバー詳細モーダル -->
<div class="modal-bg" id="modalMemberDetail">
  <div class="modal">
    <h2 id="detailMemName"></h2>
    <div id="detailMemBody"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" data-close="modalMemberDetail">閉じる</button>
      <button class="btn" id="detailEditBtn">✏️ 編集</button>
    </div>
  </div>
</div>

<!-- 出力モーダル -->
<div class="modal-bg" id="modalExport">
  <div class="modal">
    <h2>📤 データ出力</h2>

    <div class="export-section-title">📅 会食記録一覧</div>

    <label style="margin-top:6px">対象範囲</label>
    <div class="export-scope" id="exportScope">
      <label class="scope-option"><input type="radio" name="exportScope" value="all" checked><span>すべて</span></label>
      <label class="scope-option"><input type="radio" name="exportScope" value="selected"><span>選択中 (<span id="scopeSelCount">0</span>件)</span></label>
      <label class="scope-option"><input type="radio" name="exportScope" value="month"><span>期間で指定</span></label>
    </div>
    <div id="exportMonthWrap" style="display:none;margin:6px 0">
      <select id="exportMonth"></select>
    </div>
    <div id="exportScopeInfo" class="scope-info"></div>

    <div class="export-options">
      <button class="export-option" data-export="records-xlsx">
        <span class="icon">📊</span>
        <div class="name">Excel (.xlsx)</div>
        <div class="desc">編集可能</div>
      </button>
      <button class="export-option" data-export="records-pdf">
        <span class="icon">📄</span>
        <div class="name">PDF (A4縦)</div>
        <div class="desc">印刷向け</div>
      </button>
    </div>

    <div class="export-section-title" style="margin-top:18px">👥 メンバー一覧 (全件)</div>
    <div class="export-options">
      <button class="export-option" data-export="members-xlsx">
        <span class="icon">📊</span>
        <div class="name">Excel (.xlsx)</div>
        <div class="desc">編集可能</div>
      </button>
      <button class="export-option" data-export="members-pdf">
        <span class="icon">📄</span>
        <div class="name">PDF (A4縦)</div>
        <div class="desc">印刷向け</div>
      </button>
    </div>

    <div class="modal-actions">
      <button class="btn btn-secondary" data-close="modalExport">閉じる</button>
    </div>
  </div>
</div>

<!-- Excel取込モーダル -->
<div class="modal-bg" id="modalImport">
  <div class="modal">
    <h2>📥 メンバー一括取込 (Excel)</h2>
    <p style="font-size:13px;color:#9e8b85;margin:0 0 12px;line-height:1.6">
      1行目に <strong>氏名</strong>、<strong>企業名</strong>、<strong>連絡先</strong>、<strong>メモ</strong> の見出しがあるExcelファイル(.xlsx/.xls)を選択してください。<br>
      氏名のみ必須、他は空欄でも構いません。同名のメンバーがいる場合は上書きされます。
    </p>
    <button class="btn btn-secondary btn-small" id="btnDownloadTemplate" style="margin-bottom:10px">📥 テンプレートをダウンロード</button>

    <div class="import-zone" id="importZone">
      <div class="icon">📂</div>
      <p><strong>クリックしてファイルを選択</strong></p>
      <p>または、ここにドラッグ&ドロップ</p>
      <input type="file" id="importFileInput" accept=".xlsx,.xls,.csv">
    </div>

    <div id="importResult"></div>

    <div class="modal-actions">
      <button class="btn btn-secondary" data-close="modalImport">閉じる</button>
    </div>
  </div>
</div>

<script>
(function(){
"use strict";

// =====================================================
// ★ 設定エリア (デプロイ時に編集) ★
// =====================================================
var firebaseConfig = {
  apiKey: "AIzaSyACgB8obZR3Ur-J7jPKNeXXQHIjftYZZ-Y",
  authDomain: "kaishoku-app-fb221.firebaseapp.com",
  projectId: "kaishoku-app-fb221",
  storageBucket: "kaishoku-app-fb221.firebasestorage.app",
  messagingSenderId: "52314529610",
  appId: "1:52314529610:web:22c0aa7feb8c025d7eabb3"
};
var GOOGLE_PLACES_API_KEY = "YOUR_GOOGLE_PLACES_API_KEY";
// =====================================================

var isConfigured = firebaseConfig.apiKey && firebaseConfig.apiKey !== "YOUR_API_KEY";
var isPlacesConfigured = GOOGLE_PLACES_API_KEY && GOOGLE_PLACES_API_KEY !== "YOUR_GOOGLE_PLACES_API_KEY";

function showBanner(html, type){
  type = type || "warning";
  var colors = {
    warning: { bg:"#fff3cd", bd:"#ffc107", fg:"#856404" },
    info:    { bg:"#fff0e8", bd:"#ffb4a2", fg:"#d6336c" }
  };
  var c = colors[type];
  var b = document.createElement("div");
  b.style.cssText = "background:"+c.bg+";border:2px solid "+c.bd+";color:"+c.fg+";padding:14px;border-radius:14px;margin:12px;font-size:13px;line-height:1.6;font-weight:500";
  b.innerHTML = html;
  document.body.insertBefore(b, document.body.firstChild);
}

// ====== 状態 ======
var state = {
  records: [],
  members: [],
  editingSelectedMemberIds: {},
  editingVenueInfo: null,
  recordFilter: "",
  memberFilter: "",
  selectedRecordIds: {}   // {recordId: true}
};

function $(id){ return document.getElementById(id); }
function esc(s){
  return (s == null ? "" : String(s)).replace(/[&<>"']/g, function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
  });
}
function uid(){ return "id" + Date.now() + Math.floor(Math.random()*10000); }
function pad(n){ return n < 10 ? "0"+n : ""+n; }
function yen(n){ return "¥" + Number(n||0).toLocaleString(); }

// ====== データ層 ======
var db = null;
var fb = null;
var LS_RECORDS = "kaishoku_records";
var LS_MEMBERS = "kaishoku_members";

function lsLoad(){
  try {
    state.records = JSON.parse(localStorage.getItem(LS_RECORDS) || "[]");
    state.members = JSON.parse(localStorage.getItem(LS_MEMBERS) || "[]");
  } catch(e){}
}
function lsSaveRecords(){ try { localStorage.setItem(LS_RECORDS, JSON.stringify(state.records)); } catch(e){} }
function lsSaveMembers(){ try { localStorage.setItem(LS_MEMBERS, JSON.stringify(state.members)); } catch(e){} }

function addMemberData(data, cb){
  if (db) {
    fb.addDoc(fb.collection(db, "members"), Object.assign({}, data, { createdAt: fb.serverTimestamp() }))
      .then(function(ref){ cb && cb(ref.id); });
  } else {
    var id = uid();
    state.members.push(Object.assign({ id: id }, data));
    lsSaveMembers(); renderAll(); cb && cb(id);
  }
}
function updateMemberData(id, data, cb){
  if (db) {
    fb.updateDoc(fb.doc(db, "members", id), Object.assign({}, data, { updatedAt: fb.serverTimestamp() })).then(function(){ cb && cb(); });
  } else {
    for (var i=0; i<state.members.length; i++) {
      if (state.members[i].id === id) { state.members[i] = Object.assign({}, state.members[i], data); break; }
    }
    lsSaveMembers(); renderAll(); cb && cb();
  }
}
function deleteMemberData(id, cb){
  if (db) {
    fb.deleteDoc(fb.doc(db, "members", id)).then(function(){ cb && cb(); });
  } else {
    state.members = state.members.filter(function(m){ return m.id !== id; });
    lsSaveMembers(); renderAll(); cb && cb();
  }
}
function addRecordData(data, cb){
  if (db) {
    fb.addDoc(fb.collection(db, "records"), Object.assign({}, data, { createdAt: fb.serverTimestamp() })).then(function(){ cb && cb(); });
  } else {
    state.records.push(Object.assign({ id: uid() }, data));
    lsSaveRecords(); renderAll(); cb && cb();
  }
}
function updateRecordData(id, data, cb){
  if (db) {
    fb.updateDoc(fb.doc(db, "records", id), Object.assign({}, data, { updatedAt: fb.serverTimestamp() })).then(function(){ cb && cb(); });
  } else {
    for (var i=0; i<state.records.length; i++) {
      if (state.records[i].id === id) { state.records[i] = Object.assign({}, state.records[i], data); break; }
    }
    lsSaveRecords(); renderAll(); cb && cb();
  }
}
function deleteRecordData(id, cb){
  if (db) {
    fb.deleteDoc(fb.doc(db, "records", id)).then(function(){ cb && cb(); });
  } else {
    state.records = state.records.filter(function(r){ return r.id !== id; });
    lsSaveRecords(); renderAll(); cb && cb();
  }
}

// ====== ヘルパー ======
function memberById(id){
  for (var i=0; i<state.members.length; i++) if (state.members[i].id === id) return state.members[i];
  return null;
}
function getMemberMeetingDates(memberId){
  return state.records
    .filter(function(r){ return (r.memberIds || []).indexOf(memberId) >= 0; })
    .map(function(r){ return r.dateISO; })
    .sort().reverse();
}
function recordTotalCost(r){
  return (r.costMain||0) + (r.costSecond||0) + (r.costTransport||0) + (r.costOther||0);
}
var WD = ["日","月","火","水","木","金","土"];
function fmtDateTime(iso){
  if (!iso) return "";
  var d = new Date(iso);
  if (isNaN(d)) return iso;
  return d.getFullYear()+"/"+pad(d.getMonth()+1)+"/"+pad(d.getDate())+"("+WD[d.getDay()]+") "+pad(d.getHours())+":"+pad(d.getMinutes());
}
function fmtDate(iso){
  if (!iso) return "";
  var d = new Date(iso);
  if (isNaN(d)) return iso;
  return d.getFullYear()+"/"+pad(d.getMonth()+1)+"/"+pad(d.getDate());
}
function monthKey(iso){
  if (!iso) return "未定";
  var d = new Date(iso);
  if (isNaN(d)) return "未定";
  return d.getFullYear()+"-"+pad(d.getMonth()+1);
}
function monthLabel(key){
  if (key === "未定") return "日時未定";
  var p = key.split("-");
  return p[0]+"年"+Number(p[1])+"月";
}

function updateSelectionBar(){
  var bar = $("selectionBar");
  if (!bar) return;
  var ids = Object.keys(state.selectedRecordIds);
  // 存在しないIDは除去
  var validIds = ids.filter(function(id){
    return state.records.some(function(r){ return r.id === id; });
  });
  if (validIds.length !== ids.length) {
    var newSel = {};
    validIds.forEach(function(id){ newSel[id] = true; });
    state.selectedRecordIds = newSel;
  }
  if (validIds.length === 0) {
    bar.style.display = "none";
  } else {
    bar.style.display = "flex";
    $("selCount").textContent = validIds.length;
  }
}

function toggleRecordSelect(id){
  if (state.selectedRecordIds[id]) delete state.selectedRecordIds[id];
  else state.selectedRecordIds[id] = true;
  updateSelectionBar();
  // カードの見た目だけ更新（再描画は不要、CSSクラスのトグルで十分）
  var card = document.querySelector('.card[data-edit-record="'+id+'"]');
  if (card) card.classList.toggle("selected", !!state.selectedRecordIds[id]);
}

function selectAllVisible(){
  // フィルタ適用後の現在表示中レコードをすべて選択
  var q = state.recordFilter.trim().toLowerCase();
  state.records.forEach(function(r){
    if (!q) { state.selectedRecordIds[r.id] = true; return; }
    var memNames = (r.memberIds || []).map(function(id){
      var m = memberById(id); return m ? m.name : "";
    }).join(" ");
    if (((r.venue||"") + " " + (r.memo||"") + " " + memNames).toLowerCase().indexOf(q) >= 0) {
      state.selectedRecordIds[r.id] = true;
    }
  });
  renderRecords();
  updateSelectionBar();
}

function clearSelection(){
  state.selectedRecordIds = {};
  renderRecords();
  updateSelectionBar();
}

// ====== 描画 ======
function renderAll(){
  renderRecords();
  renderMembers();
  renderMemberPickList();
  updateSelectionBar();
}

function renderRecords(){
  var list = $("recordList");
  if (!list) return;
  var q = state.recordFilter.trim().toLowerCase();
  var sorted = state.records.slice().sort(function(a,b){
    return (b.dateISO || "").localeCompare(a.dateISO || "");
  });
  var filtered = sorted.filter(function(r){
    if (!q) return true;
    var memNames = (r.memberIds || []).map(function(id){
      var m = memberById(id); return m ? m.name : "";
    }).join(" ");
    return ((r.venue||"") + " " + (r.memo||"") + " " + memNames).toLowerCase().indexOf(q) >= 0;
  });

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">' +
      (state.records.length === 0 ? "まだ記録がありません<br>右下の + から追加してください" : "該当する記録がありません") +
      '</div>';
    return;
  }

  var groups = {};
  var order = [];
  filtered.forEach(function(r){
    var key = monthKey(r.dateISO);
    if (!groups[key]) { groups[key] = []; order.push(key); }
    groups[key].push(r);
  });

  var html = "";
  order.forEach(function(key){
    var recs = groups[key];
    var total = 0;
    recs.forEach(function(r){ total += recordTotalCost(r); });
    html += '<div class="month-header">' +
      '<span class="month-title">📆 ' + monthLabel(key) + '</span>' +
      '<span class="month-meta">' + recs.length + '件' +
      (total > 0 ? ' ・ ' + yen(total) : '') + '</span>' +
      '</div>';
    html += recs.map(renderRecordCard).join("");
  });
  list.innerHTML = html;
}

function renderRecordCard(r){
  var memChips = (r.memberIds || []).map(function(id){
    var m = memberById(id);
    var name = m ? m.name : "(削除済み)";
    return '<span class="member-chip" data-detail-member="'+esc(id)+'">'+esc(name)+'</span>';
  }).join("");
  var total = recordTotalCost(r);
  var costBadge = total > 0 ? '<span class="card-cost">'+yen(total)+'</span>' : '';
  var payBadge = r.payment ? '<span class="card-pay">'+esc(r.payment)+'</span>' : '';
  var d = new Date(r.dateISO);
  var day = isNaN(d) ? "?" : d.getDate();
  var wd = isNaN(d) ? "" : WD[d.getDay()];
  var hm = isNaN(d) ? "" : pad(d.getHours())+":"+pad(d.getMinutes());
  var selected = state.selectedRecordIds[r.id] ? " selected" : "";

  return '<div class="card'+selected+'" data-edit-record="'+esc(r.id)+'">' +
    '<div class="card-check" data-toggle-select="'+esc(r.id)+'" title="選択"></div>' +
    '<div class="card-day">' +
      '<div class="card-day-num">'+day+'</div>' +
      '<div class="card-day-wd">'+wd+'</div>' +
    '</div>' +
    '<div class="card-body">' +
      '<div class="card-top">' +
        '<div class="card-venue">'+esc(r.venue || "(会場未設定)")+'</div>' +
        '<div class="card-time">'+esc(hm)+'</div>' +
      '</div>' +
      (r.venueAddress ? '<div class="card-address">📍 '+esc(r.venueAddress)+'</div>' : '') +
      (costBadge || payBadge ? '<div class="card-badges">'+costBadge+payBadge+'</div>' : '') +
      (r.memo ? '<div class="card-memo">'+esc(r.memo)+'</div>' : '') +
      '<div class="card-members">'+(memChips || '<span style="color:#bbb;font-size:12px">参加者なし</span>')+'</div>' +
    '</div>' +
    '</div>';
}

function renderMembers(){
  var list = $("memberList");
  if (!list) return;
  var q = state.memberFilter.trim().toLowerCase();
  var sorted = state.members.slice().sort(function(a,b){
    return (a.name || "").localeCompare(b.name || "", "ja");
  });
  var filtered = sorted.filter(function(m){
    return !q || ((m.name||"")+" "+(m.company||"")+" "+(m.contact||"")+" "+(m.memo||"")).toLowerCase().indexOf(q) >= 0;
  });

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">' +
      (state.members.length === 0 ? "メンバー未登録<br>右上の + 追加 から登録できます" : "該当するメンバーがありません") +
      '</div>';
    return;

// ====== Google Places 検索 ======
var placesSearchTimer = null;
var placesSearchAbort = null;
var lastPlacesQuery = "";

function searchVenuePlaces(q){
  if (!isPlacesConfigured) return;
  if (!q || q.length < 2) { $("venueSuggest").style.display = "none"; return; }
  if (q === lastPlacesQuery) return;
  lastPlacesQuery = q;

  if (placesSearchAbort) try { placesSearchAbort.abort(); } catch(e){}
  placesSearchAbort = new AbortController();

  fetch("https://places.googleapis.com/v1/places:searchText", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-Goog-Api-Key": GOOGLE_PLACES_API_KEY,
      "X-Goog-FieldMask": "places.id,places.displayName,places.formattedAddress,places.internationalPhoneNumber,places.location"
    },
    body: JSON.stringify({
      textQuery: q,
      languageCode: "ja",
      maxResultCount: 7,
      regionCode: "JP"
    }),
    signal: placesSearchAbort.signal
  })
  .then(function(res){ if (!res.ok) throw new Error("Places API: " + res.status); return res.json(); })
  .then(function(data){
    var sg = $("venueSuggest");
    if (!data.places || data.places.length === 0) {
      sg.innerHTML = '<div class="venue-suggest-item" style="color:#bbb">候補なし</div>';
      sg.style.display = "block"; return;
    }
    sg.innerHTML = data.places.map(function(p){
      var name = (p.displayName && p.displayName.text) || "(名称不明)";
      var addr = p.formattedAddress || "";
      var phone = p.internationalPhoneNumber || "";
      return '<div class="venue-suggest-item" ' +
        'data-place-id="' + esc(p.id || "") + '" ' +
        'data-name="' + esc(name) + '" ' +
        'data-addr="' + esc(addr) + '" ' +
        'data-phone="' + esc(phone) + '" ' +
        'data-lat="' + (p.location && p.location.latitude || "") + '" ' +
        'data-lng="' + (p.location && p.location.longitude || "") + '">' +
        '<div class="venue-suggest-name">🏠 ' + esc(name) + '</div>' +
        '<div class="venue-suggest-addr">' + esc(addr) + '</div>' +
        '</div>';
    }).join("");
    sg.style.display = "block";
  })
  .catch(function(e){
    if (e.name === "AbortError") return;
    var sg = $("venueSuggest");
    sg.innerHTML = '<div class="venue-suggest-item" style="color:#d6336c">検索エラー: ' + esc(e.message) + '</div>';
    sg.style.display = "block";
  });
}

function openRecordEdit(recordId){
  state.editingSelectedMemberIds = {};
  state.editingVenueInfo = null;
  $("recordId").value = recordId || "";
  $("btnDeleteRecord").style.display = recordId ? "inline-block" : "none";
  $("venueSuggest").style.display = "none";
  $("venueInfo").style.display = "none";

  var radios = document.querySelectorAll('input[name="payment"]');
  for (var i=0; i<radios.length; i++) radios[i].checked = false;

  if (recordId) {
    var r = null;
    for (var i=0; i<state.records.length; i++) if (state.records[i].id === recordId) { r = state.records[i]; break; }
    if (r) {
      $("recDate").value = r.dateISO ? r.dateISO.slice(0,16) : "";
      $("recVenue").value = r.venue || "";
      $("costMain").value = r.costMain || "";
      $("costSecond").value = r.costSecond || "";
      $("costTransport").value = r.costTransport || "";
      $("costOther").value = r.costOther || "";
      $("recMemo").value = r.memo || "";
      if (r.payment) {
        for (var i=0; i<radios.length; i++) if (radios[i].value === r.payment) radios[i].checked = true;
      }
      if (r.venuePlaceId) {
        state.editingVenueInfo = {
          placeId: r.venuePlaceId,
          name: r.venue,
          address: r.venueAddress || "",
          phone: r.venuePhone || "",
          lat: r.venueLat || null,
          lng: r.venueLng || null
        };
        showVenueInfo();
      }
      (r.memberIds || []).forEach(function(id){ state.editingSelectedMemberIds[id] = true; });
    }
  } else {
    var now = new Date();
    var local = new Date(now.getTime() - now.getTimezoneOffset()*60000).toISOString().slice(0,16);
    $("recDate").value = local;
    $("recVenue").value = "";
    $("costMain").value = "";
    $("costSecond").value = "";
    $("costTransport").value = "";
    $("costOther").value = "";
    $("recMemo").value = "";
  }
  $("memberSearchInput").value = "";
  lastPlacesQuery = "";
  updateCostTotal();
  updateVenueHint();
  renderMemberPickList();
  renderSelectedMembers();
  openModal("modalRecord");
}

function openExportModal(){

function updateExportScopeUI(){
  var scopeEl = document.querySelector('input[name="exportScope"]:checked');
  var scope = scopeEl ? scopeEl.value : "all";
  $("exportMonthWrap").style.display = (scope === "month") ? "block" : "none";

  var list = getExportTargetRecords();

  list.forEach(function(r){ totalAll += recordTotalCost(r); });
  var info = $("exportScopeInfo");
  if (list.length === 0) {
    info.style.background = "#ffe0e0";

  } else {
    info.style.background = "";

  }

// ====== 出力対象の絞り込み ======
function getExportTargetRecords(){
  var scopeEl = document.querySelector('input[name="exportScope"]:checked');
  var scope = scopeEl ? scopeEl.value : "all";
  var list = state.records.slice();
  if (scope === "selected") {
    list = list.filter(function(r){ return state.selectedRecordIds[r.id]; });
  } else if (scope === "month") {
    var key = $("exportMonth").value;
    if (key) list = list.filter(function(r){ return monthKey(r.dateISO) === key; });
  }
  return list.sort(function(a,b){ return (b.dateISO||"").localeCompare(a.dateISO||""); });
}

function getExportScopeLabel(){
  var scopeEl = document.querySelector('input[name="exportScope"]:checked');
  var scope = scopeEl ? scopeEl.value : "all";
  if (scope === "selected") return "選択中";
  if (scope === "month") {
    var key = $("exportMonth").value;
    return key ? monthLabel(key) : "全期間";
  }
  return "全件";
}

function exportMembersExcel(){
  if (typeof XLSX === "undefined") { alert("Excel出力ライブラリの読込に失敗しました(ネット接続をご確認ください)"); return; }
  var list = state.members.slice().sort(function(a,b){ return (a.name||"").localeCompare(b.name||"","ja"); });
  var rows = [["氏名","企業名","連絡先","メモ","会食回数","会食参加日"]];
  list.forEach(function(m){
    var dates = getMemberMeetingDates(m.id);
    rows.push([m.name||"", m.company||"", m.contact||"", m.memo||"", dates.length, dates.map(fmtDate).join(", ")]);
  });
  var ws = XLSX.utils.aoa_to_sheet(rows);
  ws["!cols"] = [{wch:16},{wch:18},{wch:24},{wch:24},{wch:8},{wch:40}];
  var wb = XLSX.utils.book_new();

function exportRecordsExcel(){
  if (typeof XLSX === "undefined") { alert("Excel出力ライブラリの読込に失敗しました"); return; }
  var sorted = getExportTargetRecords();
  if (sorted.length === 0) { alert("出力対象の記録がありません"); return; }
  var rows = [["日時","会場","住所","電話","参加者","会食代","2次会","交通費","その他","合計","支払い方法","メモ"]];
  sorted.forEach(function(r){
    var memNames = (r.memberIds||[]).map(function(id){ var m=memberById(id); return m?m.name:"(削除済み)"; }).join(", ");
    rows.push([
      fmtDateTime(r.dateISO),
      r.venue||"", r.venueAddress||"", r.venuePhone||"",
      memNames,
      r.costMain||0, r.costSecond||0, r.costTransport||0, r.costOther||0,

      r.payment||"", r.memo||""

  ws["!cols"] = [{wch:18},{wch:20},{wch:28},{wch:14},{wch:30},{wch:10},{wch:10},{wch:10},{wch:10},{wch:12},{wch:12},{wch:30}];
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "会食記録");
  var today = new Date();
  var suffix = getExportScopeLabel().replace(/[^0-9A-Za-z\u4e00-\u9fff]/g,"_");
  XLSX.writeFile(wb, "records_"+today.getFullYear()+pad(today.getMonth()+1)+pad(today.getDate())+"_"+suffix+".xlsx");
}

      if (r.venueAddress) v += '<br><span style="font-size:7.5pt;color:#666">'+esc(r.venueAddress)+'</span>';
      return "<tr>" +
        "<td>"+esc(fmtDateTime(r.dateISO))+"</td>" +
        "<td>"+v+"</td>" +
        "<td>"+esc(memNames)+"</td>" +
        '<td class="right">'+yen(recordTotalCost(r))+'</td>' +
        "<td>"+esc(r.payment||"")+"</td>" +
        "<td>"+esc(r.memo||"")+"</td>" +
        "</tr>";
    }).join("") +
    '</tbody></table>' +
    '<div class="no-print">' +
    '<button class="btn" onclick="window.print()">📄 印刷 / PDFとして保存</button>' +
    '<button class="btn" onclick="window.close()" style="background:#999">閉じる</button>' +
    '</div>' +
    '</body></html>';
  w.document.write(html);
  w.document.close();
  setTimeout(function(){ try { w.focus(); w.print(); } catch(e){} }, 500);
}

// ====== Excel取込 ======
function downloadImportTemplate(){
  if (typeof XLSX === "undefined") { alert("ライブラリの読込に失敗しました"); return; }
  var rows = [
    ["氏名","企業名","連絡先","メモ"],
    ["山田 太郎","株式会社サンプル","yamada@example.com / 03-1234-5678","営業部長"],
    ["佐藤 花子","花子商事","sato@example.com","新規開拓担当"]
  ];
  var ws = XLSX.utils.aoa_to_sheet(rows);
  ws["!cols"] = [{wch:18},{wch:22},{wch:30},{wch:28}];
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "メンバー");
  XLSX.writeFile(wb, "members_template.xlsx");
}

function handleImportFile(file){
  var resEl = $("importResult");
  resEl.innerHTML = "";
  if (!file) return;
  if (typeof XLSX === "undefined") {
    resEl.innerHTML = '<div class="import-result error">⚠️ Excel読込ライブラリの読込に失敗しました</div>';
    return;
  }
  var reader = new FileReader();
  reader.onload = function(e){
    try {
      var data = new Uint8Array(e.target.result);
      var wb = XLSX.read(data, { type: "array" });
      var sheetName = wb.SheetNames[0];
      var rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { defval: "", header: 1 });
      if (rows.length === 0) {
        resEl.innerHTML = '<div class="import-result error">⚠️ データがありません</div>';
        return;
      }
      // ヘッダー検出
      var headers = rows[0].map(function(h){ return String(h||"").trim(); });
      var col = {
        name: findCol(headers, ["氏名","名前","name"]),
        company: findCol(headers, ["企業名","会社名","会社","company"]),
        contact: findCol(headers, ["連絡先","contact","電話","メール"]),
        memo: findCol(headers, ["メモ","備考","memo","note"])
      };
      if (col.name < 0) {
        resEl.innerHTML = '<div class="import-result error">⚠️ 「氏名」列が見つかりません。1行目に「氏名」を入れてください。</div>';
        return;
      }
      var added = 0, updated = 0, skipped = 0;
      var promises = [];
      for (var i=1; i<rows.length; i++) {
        var row = rows[i];
        if (!row || row.length === 0) continue;
        var name = String(row[col.name] || "").trim();
        if (!name) { skipped++; continue; }
        var data = {
          name: name,
          company: col.company >= 0 ? String(row[col.company]||"").trim() : "",
          contact: col.contact >= 0 ? String(row[col.contact]||"").trim() : "",
          memo: col.memo >= 0 ? String(row[col.memo]||"").trim() : ""
        };
        // 同名既存を検索
        var existing = null;
        for (var k=0; k<state.members.length; k++) {
          if ((state.members[k].name||"").trim() === name) { existing = state.members[k]; break; }
        }
        if (existing) {
          (function(eId, eData){
            promises.push(new Promise(function(res){ updateMemberData(eId, eData, res); }));
          })(existing.id, data);
          updated++;
        } else {
          (function(eData){
            promises.push(new Promise(function(res){ addMemberData(eData, res); }));
          })(data);
          added++;
        }
      }
      Promise.all(promises).then(function(){
        resEl.innerHTML = '<div class="import-result success">✅ 取込完了: 新規 '+added+' 名 / 更新 '+updated+' 名'+(skipped>0?' / スキップ '+skipped:'')+'</div>';
      });
    } catch(err) {
      resEl.innerHTML = '<div class="import-result error">⚠️ 読込エラー: ' + esc(err.message) + '</div>';
    }
  };
  reader.readAsArrayBuffer(file);
}

function findCol(headers, candidates){
  for (var i=0; i<headers.length; i++) {
    var h = headers[i].toLowerCase();
    for (var j=0; j<candidates.length; j++) {
      if (h === candidates[j].toLowerCase() || h.indexOf(candidates[j].toLowerCase()) >= 0) return i;
    }
  }
  return -1;
}

// ====== Firebase ======
function initFirebase(){
  if (!isConfigured) {
    showBanner("ℹ️ <strong>試用モード (Firebase未設定)</strong><br>" +
      "全機能を試せますが、データはこのブラウザにのみ保存され、他の端末と同期しません。<br>" +
      "本格運用には index.html 上部の <code>firebaseConfig</code> を編集してください。", "info");
    lsLoad();
    $("syncStatus").textContent = "試用モード";
    $("syncStatus").classList.add("offline");
    renderAll();
    return;
  }
  $("syncStatus").textContent = "接続中…";
  Promise.all([
    import("https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js"),
    import("https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js")
  ]).then(function(mods){
    var fbApp = mods[0], fbFs = mods[1];
    var app = fbApp.initializeApp(firebaseConfig);
    db = fbFs.getFirestore(app);
    fb = fbFs;
    try { fbFs.enableIndexedDbPersistence(db); } catch(e){}
    subscribeAll();
  }).catch(function(e){
    showBanner("⚠️ <strong>Firebase接続エラー</strong><br>"+esc(e.message));
    lsLoad();
    $("syncStatus").textContent = "エラー(ローカル保存)";
    $("syncStatus").classList.add("offline");
    renderAll();
  });
}
function subscribeAll(){
  fb.onSnapshot(
    fb.query(fb.collection(db, "records"), fb.orderBy("dateISO", "desc")),
    function(snap){
      state.records = snap.docs.map(function(d){ return Object.assign({ id: d.id }, d.data()); });
      $("syncStatus").textContent = snap.metadata.fromCache ? "オフライン" : "同期済み";
      renderAll();
    }
  );
  fb.onSnapshot(
    fb.query(fb.collection(db, "members"), fb.orderBy("name")),
    function(snap){
      state.members = snap.docs.map(function(d){ return Object.assign({ id: d.id }, d.data()); });
      renderAll();
    }
  );
}

// ====== イベント ======
function attachEvents(){
  var btns = document.querySelectorAll(".tab-btn");
  for (var i=0; i<btns.length; i++) {
    btns[i].addEventListener("click", function(e){
      switchView(e.currentTarget.getAttribute("data-view"));
    });
  }

  $("fabAdd").addEventListener("click", function(){ openRecordEdit(null); });
  $("filterRecord").addEventListener("input", function(e){ state.recordFilter = e.target.value; renderRecords(); });
  $("filterMember").addEventListener("input", function(e){ state.memberFilter = e.target.value; renderMembers(); });
  $("memberSearchInput").addEventListener("input", renderMemberPickList);

  $("btnAddMember").addEventListener("click", function(){ openMemberEdit(null); });

  // 出力モーダル
  $("btnExport").addEventListener("click", openExportModal);
  $("btnExport2").addEventListener("click", openExportModal);

  // 選択操作
  $("btnSelectAll").addEventListener("click", selectAllVisible);
  $("btnSelectClear").addEventListener("click", clearSelection);

  // 出力範囲ラジオ
  document.querySelectorAll('input[name="exportScope"]').forEach(function(r){
    r.addEventListener("change", updateExportScopeUI);
  });
  $("exportMonth").addEventListener("change", updateExportScopeUI);

  // 取込モーダル
  $("btnImportMembers").addEventListener("click", function(){
    $("importResult").innerHTML = "";
    $("importFileInput").value = "";
    openModal("modalImport");
  });
  $("btnDownloadTemplate").addEventListener("click", downloadImportTemplate);
  $("importZone").addEventListener("click", function(){ $("importFileInput").click(); });
  $("importFileInput").addEventListener("change", function(e){
    if (e.target.files && e.target.files[0]) handleImportFile(e.target.files[0]);
  });
  $("importZone").addEventListener("dragover", function(e){ e.preventDefault(); $("importZone").classList.add("drag-over"); });
  $("importZone").addEventListener("dragleave", function(){ $("importZone").classList.remove("drag-over"); });
  $("importZone").addEventListener("drop", function(e){
    e.preventDefault(); $("importZone").classList.remove("drag-over");
    if (e.dataTransfer.files && e.dataTransfer.files[0]) handleImportFile(e.dataTransfer.files[0]);
  });

  // 出力オプションクリック
  document.querySelectorAll("[data-export]").forEach(function(b){
    b.addEventListener("click", function(){
      var type = b.getAttribute("data-export");
      closeModal("modalExport");
      setTimeout(function(){
        if (type === "members-xlsx") exportMembersExcel();
        else if (type === "members-pdf") exportMembersPDF();
        else if (type === "records-xlsx") exportRecordsExcel();
        else if (type === "records-pdf") exportRecordsPDF();
      }, 100);
    });
  });

  var costInputs = document.querySelectorAll(".cost-input");
  for (var i=0; i<costInputs.length; i++) {
    costInputs[i].addEventListener("input", updateCostTotal);
  }

  // 会場入力
  $("recVenue").addEventListener("input", function(e){
    var v = e.target.value.trim();
    if (state.editingVenueInfo && state.editingVenueInfo.name !== v) clearVenueInfo();
    if (placesSearchTimer) clearTimeout(placesSearchTimer);
    if (!isPlacesConfigured) { $("venueSuggest").style.display = "none"; return; }
    placesSearchTimer = setTimeout(function(){ searchVenuePlaces(v); }, 400);
  });
  $("recVenue").addEventListener("blur", function(){
    setTimeout(function(){ $("venueSuggest").style.display = "none"; }, 200);
  });
  $("recVenue").addEventListener("focus", function(e){
    var v = e.target.value.trim();
    if (isPlacesConfigured && v.length >= 2 && !state.editingVenueInfo) searchVenuePlaces(v);
  });

  var closeBtns = document.querySelectorAll("[data-close]");
  for (var i=0; i<closeBtns.length; i++) {
    closeBtns[i].addEventListener("click", function(e){
      closeModal(e.currentTarget.getAttribute("data-close"));
    });
  }
  var bgs = document.querySelectorAll(".modal-bg");
  for (var i=0; i<bgs.length; i++) {
    bgs[i].addEventListener("click", function(e){
      if (e.target === e.currentTarget) e.currentTarget.classList.remove("active");
    });
  }

  $("btnAddNewInline").addEventListener("click", function(){
    var name = ($("memberSearchInput").value || "").trim();
    if (!name) { alert("氏名を入力してから「＋新規」を押してください"); return; }
    addMemberData({ name: name, company: "", contact: "", memo: "" }, function(newId){
      state.editingSelectedMemberIds[newId] = true;
      $("memberSearchInput").value = "";
      renderMemberPickList();
      renderSelectedMembers();
    });
  });

  $("btnSaveRecord").addEventListener("click", function(){
    var id = $("recordId").value;
    var paymentEl = document.querySelector('input[name="payment"]:checked');
    var data = {
      dateISO: $("recDate").value || new Date().toISOString().slice(0,16),
      venue: $("recVenue").value.trim(),
      memberIds: Object.keys(state.editingSelectedMemberIds),
      costMain: Number($("costMain").value) || 0,
      costSecond: Number($("costSecond").value) || 0,
      costTransport: Number($("costTransport").value) || 0,
      costOther: Number($("costOther").value) || 0,
      payment: paymentEl ? paymentEl.value : "",
      memo: $("recMemo").value.trim()
    };
    if (state.editingVenueInfo && state.editingVenueInfo.placeId) {
      data.venuePlaceId = state.editingVenueInfo.placeId;
      data.venueAddress = state.editingVenueInfo.address || "";
      data.venuePhone = state.editingVenueInfo.phone || "";
      data.venueLat = state.editingVenueInfo.lat || null;
      data.venueLng = state.editingVenueInfo.lng || null;
    } else {
      data.venuePlaceId = "";
      data.venueAddress = "";
      data.venuePhone = "";
      data.venueLat = null;
      data.venueLng = null;
    }
    if (id) updateRecordData(id, data, function(){ closeModal("modalRecord"); });
    else addRecordData(data, function(){ closeModal("modalRecord"); });
  });

  $("btnDeleteRecord").addEventListener("click", function(){
    var id = $("recordId").value;
    if (!id) return;
    if (!confirm("この記録を削除します。よろしいですか?")) return;
    deleteRecordData(id, function(){ closeModal("modalRecord"); });
  });

  $("btnSaveMember").addEventListener("click", function(){
    var name = $("memName").value.trim();
    if (!name) { alert("氏名は必須です"); return; }
    var id = $("memberId").value;
    var data = {
      name: name,
      company: $("memCompany").value.trim(),
      contact: $("memContact").value.trim(),
      memo: $("memMemo").value.trim()
    };
    if (id) updateMemberData(id, data, function(){ closeModal("modalMember"); });
    else addMemberData(data, function(){ closeModal("modalMember"); });
  });

  $("btnDeleteMember").addEventListener("click", function(){
    var id = $("memberId").value;
    if (!id) return;
    var usedIn = state.records.filter(function(r){ return (r.memberIds || []).indexOf(id) >= 0; }).length;
    var msg = usedIn > 0
      ? "このメンバーは "+usedIn+" 件の記録で使われています。削除すると記録からも外れます。続行しますか?"
      : "このメンバーを削除します。よろしいですか?";
    if (!confirm(msg)) return;
    var pending = state.records.filter(function(r){ return (r.memberIds || []).indexOf(id) >= 0; });
    var done = 0;
    function next(){
      if (done >= pending.length) {
        deleteMemberData(id, function(){ closeModal("modalMember"); });
        return;
      }
      var r = pending[done++];
      var newIds = (r.memberIds || []).filter(function(x){ return x !== id; });
      updateRecordData(r.id, { memberIds: newIds }, next);
    }
    if (pending.length === 0) deleteMemberData(id, function(){ closeModal("modalMember"); });
    else next();
  });

  document.addEventListener("click", function(e){
    var t = e.target;
    // チェックボックス
    var toggleId = t.getAttribute && t.getAttribute("data-toggle-select");
    if (toggleId) {
      e.stopPropagation();
      toggleRecordSelect(toggleId);
      return;
    }
    var suggestItem = t.closest && t.closest(".venue-suggest-item");
    if (suggestItem && suggestItem.getAttribute("data-place-id")) {
      selectVenuePlace(suggestItem); return;
    }
    if (t.id === "btnClearVenueInfo") { clearVenueInfo(); return; }
    var detailId = t.getAttribute && t.getAttribute("data-detail-member");
    if (detailId) { e.stopPropagation(); showMemberDetail(detailId); return; }
    var card = t.closest && t.closest("[data-edit-record]");
    if (card && !t.getAttribute("data-detail-member") && !t.getAttribute("data-toggle-select")) {
      openRecordEdit(card.getAttribute("data-edit-record")); return;
    }
    var pickId = t.getAttribute && t.getAttribute("data-pick");
    if (pickId) { toggleMemberPick(pickId); return; }
  });
}

attachEvents();
initFirebase();
updateVenueHint();

})();
</script>
